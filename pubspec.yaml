name: duckoff
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.7+7

environment:
  sdk: ^3.11.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  provider: ^6.1.5+1
  multi_split_view: ^3.6.1
  path: ^1.9.1
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  shared_preferences: ^2.5.5
  re_editor: ^0.8.0
  re_highlight: ^0.0.3
  desktop_drop: ^0.7.1
  xterm: ^4.0.0
  flutter_pty: ^0.4.2
  flutter_markdown_plus: ^1.0.3
  # Promoted from transitive (was pulled in by flutter_markdown_plus)
  # because we register a custom MarkdownElementBuilder for fenced
  # code blocks and need direct access to `md.Element`. Pinning here
  # decouples our code-block rendering from any future shuffling of
  # flutter_markdown_plus's transitive deps.
  markdown: ^7.3.1
  youtube_player_iframe: ^5.2.2
  webview_windows:
    path: packages/webview_windows
  archive: ^4.0.9
  crypto: ^3.0.7
  image: ^4.8.0
  pasteboard: ^0.5.0
  # Embedded HTTP server used by the optional Remote Access feature
  # (see lib/services/remote/lumen_server.dart). Bound to 127.0.0.1
  # until pairing/TLS land. shelf + shelf_router for routing,
  # shelf_web_socket for the /v1/stream live-event channel, and
  # web_socket_channel for the typed `WebSocketChannel` we hand
  # off to the bus. All four are official dart-lang packages.
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.0
  # Native-window control for Flutter desktop. Used so the welcome
  # screen renders as a small panel-sized window (no surrounding
  # blank background) and the window grows to maximised when the
  # user opens a workspace. See lib/services/window_chrome.dart.
  window_manager: ^0.5.1
  # Pure-Dart SSH/SFTP client. Powers the Remote pane (right-of-editor
  # split) and the SSH session tabs. We pipe `SSHClient.shell()`
  # streams straight into `xterm.Terminal` — no PTY in this path. SFTP
  # is used for drag-drop upload from the file explorer and for the
  # remote-mirror edit-on-save flow (download → open as local mirror
  # → save = SFTP upload + conflict detect). See lib/services/ssh/.
  dartssh2: ^2.17.1
  # OS-keystore-backed encrypted storage for the SSH host vault
  # (private keys, passphrases). DPAPI on Windows, Keychain on macOS,
  # libsecret on Linux. The vault metadata (host, user, port, label)
  # rides in shared_preferences as JSON; only the secrets ride here.
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/lumen_logo.png
    # Empty-editor mascot — used by the "duck steals the Open File button"
    # gag in lib/widgets/editor/editor.dart::_DuckMischief. Right-facing
    # walk cycle gif; we flip horizontally when the duck waddles back
    # out of frame.
    - assets/Haviduck.gif
    # uBlock Origin Lite (MV3) — bundled as a zip and unpacked at first
    # launch into %LOCALAPPDATA%/Lumen/extensions/ublock-lite/. Loaded
    # into the shared media WebView2 via `WebviewController.addBrowserExtension`.
    # See `lib/services/extension_provisioner.dart` for the unpack flow.
    - assets/extensions/ublock-lite.zip
    # Remote Access PWA — vanilla HTML/CSS/JS chat client served by
    # the LumenServer at `GET /app/*` so any phone on the LAN /
    # Tailscale can load the chat without an APK. See
    # `lib/services/remote/lumen_static_assets.dart`.
    - assets/remote_app/
    # ripgrep (BurntSushi/ripgrep, MIT/Unlicense). Bundled so
    # SEARCH_TEXT's regex / glob / context features work without
    # requiring colleagues to install rg manually. Provisioned at
    # first use into <appSupport>/bin/rg/<plat>/ by
    # `lib/services/ripgrep_provisioner.dart`. Licenses live next
    # to the binary directory and are required for redistribution
    # — don't drop them.
    - assets/bin/rg/win-x64/rg.exe
    - assets/bin/rg/LICENSE-MIT
    - assets/bin/rg/UNLICENSE
    - assets/bin/rg/COPYING
    - assets/bin/copilot/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
